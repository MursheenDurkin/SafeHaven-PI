# ============================================================
#  SafeHaven Pi — nftables Rules for Mode 2 (Activist Mode)
#  Transparent Tor proxy — all hotspot client traffic routed
#  through Tor. DNS queries redirected to Tor's DNSPort.
#
#  Applied by safehaven.sh when Mode 2 activates.
#  Use restore_nftables() to return to Mode 1 rules.
# ============================================================

table inet safehaven {

    set addr-set-suricata {
        type ipv4_addr
    }

    chain input {
        type filter hook input priority filter; policy drop;
        iifname "lo" accept
        ct state established,related accept
        iifname "tailscale0" accept

        # Block direct SSH from hotspot clients (use Tailscale for remote admin)
        iifname "wlan1" tcp dport 22 drop

        # Allow hotspot clients to reach the Pi (for portal, DNS, Tor ports)
        iifname "wlan1" accept

        # Allow management SSH on upstream interface
        iifname "wlan0" tcp dport 22 accept

        # Allow Tor transparent proxy and DNS ports (local only)
        tcp dport 9040 ip daddr 10.42.0.1 accept
        udp dport 9053 ip daddr 10.42.0.1 accept
        tcp dport 9053 ip daddr 10.42.0.1 accept

        # Allow WireGuard (Mode 2B — Tor over WireGuard)
        iifname "wg0" accept
        udp dport 51820 accept
        udp dport 41641 accept

        drop
        meta l4proto tcp ip saddr @addr-set-suricata reject with icmp port-unreachable
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        # Hotspot clients go to upstream internet (Tor handles routing)
        iifname "wlan1" oifname "wlan0" accept
        # Mode 2B: allow through WireGuard tunnel too
        iifname "wlan1" oifname "wg0" accept
        iifname "wg0" oifname "wlan0" accept
        iifname "wlan0" ct state established,related accept
        iifname "wg0" ct state established,related accept
        iifname "tailscale0" accept
        oifname "tailscale0" accept
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        oifname "wlan0" masquerade
    }

    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # ── Redirect DNS to Tor's DNSPort ─────────────────────
        iifname "wlan1" udp dport 53 dnat ip to 10.42.0.1:9053
        iifname "wlan1" tcp dport 53 dnat ip to 10.42.0.1:9053

        # ── Redirect all TCP to Tor's TransPort ───────────────
        # Exclude traffic already going to the Pi itself (portal, admin)
        iifname "wlan1" ip protocol tcp ip daddr != 10.42.0.1 dnat ip to 10.42.0.1:9040
    }
}
