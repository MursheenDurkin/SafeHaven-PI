# ============================================================
#  SafeHaven Pi — hostapd Configuration Template
#  Edit the values marked with <CHANGE_THIS> before running
# ============================================================

# Network interface for the hotspot
# Use your USB WiFi adapter interface (check with: ip link show)
interface=wlan1

# WiFi driver
driver=nl80211

# ── Hotspot Identity ──────────────────────────────────────────
# The name people will see when searching for WiFi
ssid=<CHANGE_THIS: e.g. SafeHaven-Pi>

# Country code (required for legal operation)
# UK = GB, USA = US, Germany = DE etc.
country_code=<CHANGE_THIS: e.g. GB>

# ── Radio Settings ────────────────────────────────────────────
# 2.4GHz = hw_mode=g, Channel 6 recommended
# 5GHz   = hw_mode=a, Channel 36 recommended
hw_mode=g
channel=6
ieee80211n=1
ieee80211ac=1
wmm_enabled=1

# ── Security ─────────────────────────────────────────────────
# WPA2 encryption (WPA3 if your adapter supports it)
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Password for the SafeHaven Pi hotspot
# Use something strong — this is the key to your secure network
wpa_passphrase=<CHANGE_THIS: minimum 8 characters>

# ── Advanced ─────────────────────────────────────────────────
# Hide the network from broadcast scans (optional — 1=hidden)
ignore_broadcast_ssid=0

# Max connected clients
max_num_sta=10
