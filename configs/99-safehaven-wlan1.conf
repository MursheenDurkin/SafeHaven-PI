# SafeHaven Pi — tell NetworkManager to leave wlan1 alone.
#
# wlan1 is the USB WiFi adapter that hostapd uses to broadcast the
# SafeHaven hotspot. By default, NetworkManager will try to manage ANY
# WiFi interface it sees, which means on every hot-plug it grabs wlan1
# and puts it in "managed" mode. hostapd then can't claim the interface
# for AP mode and dies in a restart loop with:
#
#    hostapd: Could not set interface wlan1 flags (UP): Operation not permitted
#    nl80211: Could not configure driver mode
#    nl80211 driver initialization failed.
#
# This config tells NM to ignore wlan1 entirely, leaving it free for
# hostapd to own.
#
# Installed to /etc/NetworkManager/conf.d/99-safehaven-wlan1.conf
# by install.sh. NetworkManager reads the conf.d directory on restart.

[keyfile]
unmanaged-devices=interface-name:wlan1
