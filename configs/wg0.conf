# ============================================================
#  SafeHaven Pi — WireGuard VPN Configuration Template
#  Edit all values marked with <CHANGE_THIS> before running
#  Generate keys with:  wg genkey | tee privatekey | wg pubkey > publickey
# ============================================================

[Interface]
# Your Pi's WireGuard private key (generated during install.sh)
PrivateKey = <CHANGE_THIS: paste output of: cat /etc/wireguard/privatekey>

# IP address for this Pi on the VPN tunnel
Address = 10.0.0.1/24

# Port WireGuard listens on
ListenPort = 51820

# ── Routing rules applied when tunnel comes up ────────────────
PostUp   = nft add rule ip nat POSTROUTING oifname "eth0" masquerade
PostDown = nft delete rule ip nat POSTROUTING oifname "eth0" masquerade

# ── Peer (VPN Server or Client) ───────────────────────────────
# Add one [Peer] block per device you want to connect
# For each peer device, run: wg genkey | tee peer_privatekey | wg pubkey > peer_publickey

[Peer]
# Public key of the connecting device
PublicKey = <CHANGE_THIS: paste peer public key>

# IP address assigned to this peer on the tunnel
AllowedIPs = 10.0.0.2/32

# If this is a remote server (not a local client), add its endpoint:
# Endpoint = <server-ip>:51820
