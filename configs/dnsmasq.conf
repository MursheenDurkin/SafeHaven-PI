# ============================================================
#  SafeHaven Pi — dnsmasq Configuration Template
#  DHCP server and DNS for connected hotspot clients
# ============================================================

# Interface to serve DHCP on (your hotspot interface)
interface=wlan1

# Don't serve DHCP on the upstream interface
except-interface=eth0

# ── DHCP Range ────────────────────────────────────────────────
# IP range handed to connecting devices
# Format: dhcp-range=start,end,netmask,lease-time
dhcp-range=10.42.0.10,10.42.0.100,255.255.255.0,24h

# Gateway (this Pi's IP on the hotspot network)
dhcp-option=3,10.42.0.1

# DNS server (Pi-hole running on this Pi)
dhcp-option=6,10.42.0.1

# ── DNS Settings ─────────────────────────────────────────────
# Forward DNS to Pi-hole, then upstream
server=127.0.0.1#5335
no-resolv

# ── Logging (disable for privacy in Mode 2) ───────────────────
# Comment out the log lines below to enable zero-log mode
log-queries
log-dhcp
