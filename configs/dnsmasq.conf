# ============================================================
#  SafeHaven Pi — dnsmasq Configuration Template
#  Role: DHCP server ONLY (DNS is handled by Pi-hole)
#
#  Deployed to:   /etc/dnsmasq.d/safehaven.conf
#
#  Architecture note:
#  Pi-hole's FTL daemon listens on port 53 for DNS. If dnsmasq
#  also tries to serve DNS, both processes bind to 0.0.0.0:53 —
#  Linux allows this but queries get silently dropped between
#  them. Symptom: phones connect to the hotspot, get DHCP, but
#  every DNS query times out and the device reports "no
#  internet." Hence the port=0 line below — it disables
#  dnsmasq's DNS listener entirely while keeping DHCP intact.
#
#  See TROUBLESHOOTING.md for a full write-up of this class
#  of failure.
# ============================================================

# Interface to serve DHCP on (the hotspot adapter)
interface=wlan1

# Don't serve DHCP on the upstream interface
except-interface=eth0

# ── DNS disabled — Pi-hole owns port 53 ──────────────────────
# Removing this line WILL break DNS on all connected clients.
port=0

# ── DHCP Range ───────────────────────────────────────────────
# IP range handed to connecting devices
# Format: dhcp-range=start,end,netmask,lease-time
dhcp-range=10.42.0.10,10.42.0.250,255.255.255.0,24h

# ── DHCP Options sent to clients ─────────────────────────────
# Gateway (this Pi's IP on the hotspot network)
dhcp-option=option:router,10.42.0.1

# DNS server — point clients at Pi-hole (running on this Pi)
dhcp-option=option:dns-server,10.42.0.1

# ── Logging (DHCP only — port=0 means no DNS queries to log) ─
log-dhcp
