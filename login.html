<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeHaven Pi — Admin Access</title>
<!-- Self-contained / offline-safe: no external fonts, no CDN, no network. -->
<style>
  :root {
    --bg: #0a0d12;
    --surface: #111520;
    --surface2: #181d2a;
    --border: #252d3d;

    --teal: #5FD7D7;
    --teal-glow: rgba(95,215,215,0.15);
    --teal-border: rgba(95,215,215,0.35);
    --teal-deep: #062020;

    --emerald: #10b981;
    --emerald-glow: rgba(16,185,129,0.15);

    --amber: #f59e0b;
    --amber-glow: rgba(245,158,11,0.12);

    --text: #e8ecf4;
    --muted: #6b7a94;
    --dim: #4a5568;

    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height:100vh;
    display:grid;
    grid-template-rows: 1fr auto;
    line-height:1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x:hidden;
  }

  .halo {
    position: fixed;
    top: 50%; left: 50%;
    width: 820px; height: 820px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
    mask-image: radial-gradient(circle, black 40%, transparent 72%);
    -webkit-mask-image: radial-gradient(circle, black 40%, transparent 72%);
  }
  .halo svg { width:100%; height:100%; display:block; }

  .shell {
    position: relative; z-index: 1;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items:center;
    max-width: 1080px;
    width: 100%;
    margin: 0 auto;
    padding: 60px 48px;
  }

  .hero { display:flex; flex-direction:column; gap: 20px; }
  .hero .id-chip {
    display:inline-flex; align-items:center; gap:8px;
    background: var(--emerald-glow);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--emerald);
    padding: 6px 12px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em;
    width: fit-content;
    text-transform: uppercase;
  }
  .id-chip .dot {
    width: 6px; height: 6px; border-radius:50%;
    background: var(--emerald);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.5);} 50%{opacity:.7;box-shadow:0 0 0 8px rgba(16,185,129,0);} }

  .hero h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 0.95;
  }
  .hero h1 .pi { color: var(--teal); }
  .hero .sub {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .hero .sub .bar { color: var(--border); margin: 0 10px; }

  .hero .services {
    display:flex; flex-wrap: wrap; gap: 8px;
    margin-top: 6px;
  }
  .hero .services span {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    background: rgba(24,29,42,0.6);
  }
  .hero .services span.live {
    color: var(--teal);
    border-color: var(--teal-border);
    background: var(--teal-glow);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 30px;
    position:relative;
    animation: fadeUp .5s cubic-bezier(.2,.7,.3,1);
    box-shadow: 0 30px 80px -30px rgba(0,0,0,0.7);
  }
  @keyframes fadeUp { from{transform:translateY(12px);} to{transform:none;} }

  .card::before, .card::after,
  .card > .bl, .card > .br {
    content:''; position:absolute;
    width: 16px; height: 16px;
    border: 1.5px solid var(--teal);
  }
  .card::before { top: -1px; left: -1px; border-right:none; border-bottom:none; }
  .card::after { top: -1px; right: -1px; border-left:none; border-bottom:none; }
  .card .bl { bottom: -1px; left: -1px; border-right:none; border-top:none; }
  .card .br { bottom: -1px; right: -1px; border-left:none; border-top:none; }

  .card-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-head .title-row { display:flex; align-items:center; gap: 10px; }
  .card-head .mini-logo {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--teal-glow);
    border: 1px solid var(--teal);
    display:flex; align-items:center; justify-content:center;
    color: var(--teal);
  }
  .card-head .mini-logo svg { width: 14px; height: 14px; display:block; }
  .card-head h2 {
    font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .card-head .host {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  form { display:flex; flex-direction:column; gap: 14px; }
  .field { display:flex; flex-direction:column; gap: 6px; }
  label {
    font-family: var(--mono);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  label::before { content:''; width: 4px; height:4px; background: var(--teal); border-radius:50%; }

  .input-wrap {
    position:relative; display:flex; align-items:center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color .15s, box-shadow .15s;
  }
  .input-wrap:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 4px rgba(95,215,215,0.1);
  }
  .input-wrap.has-error {
    border-color: var(--amber);
    box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
  }
  .input-wrap input {
    flex:1; background:transparent; border:none; outline:none;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px; font-weight: 500;
  }
  .input-wrap input::placeholder { color: var(--dim); }

  .toggle-pw {
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    padding: 0 14px; height:100%;
    font-family: var(--mono);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: color .15s;
  }
  .toggle-pw:hover { color: var(--text); }
  .toggle-pw:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

  .error-pill {
    display:none; align-items:center; gap: 8px;
    background: var(--amber-glow);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--amber);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px; font-weight: 600;
    width: fit-content;
    animation: shake .3s;
  }
  .error-pill.show { display:inline-flex; }
  .error-pill .bullet { width: 6px; height: 6px; border-radius:50%; background: var(--amber); }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-3px);} 75%{transform:translateX(3px);} }

  .submit {
    margin-top: 6px;
    background: var(--teal);
    color: var(--teal-deep);
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--sans);
    font-size: 15px; font-weight: 800;
    letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, box-shadow .15s, opacity .15s, transform .1s;
    box-shadow: 0 8px 28px -8px rgba(95,215,215,0.5);
    display:flex; align-items:center; justify-content:center; gap:10px;
    min-height: 50px;
    position: relative;
    overflow:hidden;
  }
  .submit:hover { background:#74e2e2; box-shadow:0 10px 32px -6px rgba(95,215,215,0.6); }
  .submit:active { transform: translateY(1px); }
  .submit:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
  .submit.loading { opacity: 0.72; cursor: wait; }
  .submit .label-text { display:inline-flex; align-items:center; gap: 8px; }
  .submit .label-text::after {
    content:'→'; font-family: var(--mono); font-weight:700;
    transition: transform .15s;
  }
  .submit:hover .label-text::after { transform: translateX(3px); }
  .submit.loading .label-text { display:none; }
  .submit .loading-text { display:none; }
  .submit.loading .loading-text { display:inline-flex; align-items:center; gap: 4px; }
  .submit .dots { display:inline-flex; gap:3px; margin-left:4px; }
  .submit .dots span {
    width: 5px; height: 5px; border-radius:50%;
    background: currentColor; opacity: .25;
    animation: dotpulse 1.2s infinite;
  }
  .submit .dots span:nth-child(2){ animation-delay:.2s; }
  .submit .dots span:nth-child(3){ animation-delay:.4s; }
  @keyframes dotpulse { 0%,60%,100%{opacity:.25;} 30%{opacity:1;} }

  .card-foot {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
    font-family: var(--mono);
    font-size: 11px;
  }
  .card-foot .left { color: var(--muted); }
  .card-foot .right { color: var(--teal); }

  footer {
    padding: 20px 24px;
    text-align:center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    border-top: 1px solid var(--border);
    position:relative; z-index:1;
  }
  footer .tag { color: var(--muted); }
  footer .sep { color: var(--border); margin: 0 10px; }

  .mobile-services-toggle {
    display: none;
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    width: 100%;
    text-align:left;
    align-items:center;
    justify-content:space-between;
    transition: border-color .15s, color .15s;
  }
  .mobile-services-toggle:hover { border-color: var(--teal); color: var(--teal); }
  .mobile-services-toggle .chev { transition: transform .2s; }
  .mobile-services-toggle[aria-expanded="true"] .chev { transform: rotate(180deg); }

  /* Responsive: desktop >= 768px, mobile < 768px */
  @media (max-width: 767px) {
    .shell {
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 36px 24px;
      max-width: 520px;
    }
    .card { order: 1; }
    .hero { order: 2; }
    .hero h1 { font-size: 36px; }
    .hero .id-chip { display:none; }
    .hero .services { display:none; }
    .hero.expanded .services { display:flex; }
    .mobile-services-toggle { display:flex !important; }
    .halo { width: 640px; height:640px; opacity: 0.35; }
  }
  @media (max-width: 480px) {
    .shell { padding: 28px 16px; gap: 20px; }
    .card { padding: 22px; }
    .hero h1 { font-size: 30px; }
    .hero .sub { font-size: 12px; }
    .card-head h2 { font-size: 13px; }
    footer { padding: 16px; font-size: 10px; }
    footer .sep { margin: 0 6px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <div class="halo" aria-hidden="true">
    <svg viewBox="0 0 800 800" fill="none" stroke="#5FD7D7" stroke-width="1">
      <g opacity="0.15"><polygon points="400,80 680,240 680,560 400,720 120,560 120,240"/></g>
      <g opacity="0.22"><polygon points="400,150 620,275 620,525 400,650 180,525 180,275"/></g>
      <g opacity="0.3"><polygon points="400,220 560,310 560,490 400,580 240,490 240,310"/></g>
      <g opacity="0.4"><polygon points="400,290 500,345 500,455 400,510 300,455 300,345"/></g>
      <g fill="#5FD7D7"><circle cx="400" cy="80" r="4"/><circle cx="680" cy="240" r="4"/><circle cx="680" cy="560" r="4"/><circle cx="400" cy="720" r="4"/><circle cx="120" cy="560" r="4"/><circle cx="120" cy="240" r="4"/></g>
    </svg>
  </div>

  <main class="shell">
    <section class="hero" id="hero">
      <span class="id-chip"><span class="dot"></span>System Online</span>
      <h1>Safe<span>Haven</span> <span class="pi">Pi</span></h1>
      <div class="sub">Admin Access<span class="bar">/</span>Privacy Dashboard v1.0</div>
      <div class="services" id="services">
        <span class="live">WireGuard</span>
        <span class="live">Pi-hole</span>
        <span class="live">Suricata</span>
        <span class="live">Fail2ban</span>
        <span class="live">Cowrie</span>
        <span class="live">nftables</span>
      </div>
      <button type="button" class="mobile-services-toggle" id="servicesToggle" aria-expanded="false" aria-controls="services">
        <span>● 6 services active</span>
        <span class="chev">▾</span>
      </button>
    </section>

    <section class="card">
      <span class="bl"></span><span class="br"></span>
      <div class="card-head">
        <div class="title-row">
          <div class="mini-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2.5 4 5v6.2c0 4.7 3.4 8.6 8 9.8 4.6-1.2 8-5.1 8-9.8V5l-8-2.5Z"/>
              <path d="m8.5 12 2.6 2.6L15.5 10"/>
            </svg>
          </div>
          <h2>Authenticate</h2>
        </div>
        <span class="host">10.42.0.1:5000</span>
      </div>

      <form id="loginForm" method="POST" action="/login" autocomplete="off">
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap" id="wrapUser">
            <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" spellcheck="false" required>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap" id="wrapPass">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">Show</button>
          </div>
        </div>

        <div class="error-pill" id="errorPill" role="alert" aria-live="polite">
          <span class="bullet"></span>
          <span id="errorMsg">Invalid credentials</span>
        </div>

        <button type="submit" class="submit" id="submitBtn">
          <span class="label-text">Unlock</span>
          <span class="loading-text">Unlocking<span class="dots"><span></span><span></span><span></span></span></span>
        </button>
      </form>

      <div class="card-foot">
        <span class="left">local device · no telemetry</span>
        <span class="right">● encrypted</span>
      </div>
    </section>
  </main>

  <footer>
    <span class="tag">&ldquo;Privacy is a right, not a product.&rdquo;</span>
    <span class="sep">/</span>
    <span>UWTSD · ACCB6019 · 2026</span>
  </footer>

<script>
(function(){
  var form = document.getElementById('loginForm');
  var submitBtn = document.getElementById('submitBtn');
  var errorPill = document.getElementById('errorPill');
  var togglePw = document.getElementById('togglePw');
  var pwInput = document.getElementById('password');
  var userInput = document.getElementById('username');
  var wrapUser = document.getElementById('wrapUser');
  var wrapPass = document.getElementById('wrapPass');
  var hero = document.getElementById('hero');
  var servicesToggle = document.getElementById('servicesToggle');

  // Show/hide password
  togglePw.addEventListener('click', function(){
    var shown = pwInput.type === 'text';
    pwInput.type = shown ? 'password' : 'text';
    togglePw.textContent = shown ? 'Show' : 'Hide';
    togglePw.setAttribute('aria-label', shown ? 'Show password' : 'Hide password');
  });

  // Clear error state as the user retypes
  [userInput, pwInput].forEach(function(inp){
    inp.addEventListener('input', function(){
      errorPill.classList.remove('show');
      wrapUser.classList.remove('has-error');
      wrapPass.classList.remove('has-error');
    });
  });

  // Submit -> show "Unlocking..." state; native POST /login proceeds.
  // Backend decides: on success it redirects; on failure it re-serves this
  // page with an ?error=1 query param (see below) so the pill reappears.
  form.addEventListener('submit', function(){
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
  });

  // If the server round-tripped with ?error=1, re-surface the error state.
  // Strip the query params afterwards so a page refresh gives a clean login
  // rather than re-displaying the stale error message.
  try {
    var params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      wrapUser.classList.add('has-error');
      wrapPass.classList.add('has-error');
      errorPill.classList.add('show');
      var msg = params.get('msg');
      if (msg) document.getElementById('errorMsg').textContent = msg;
      userInput.value = params.get('u') || '';
      pwInput.focus();

      // Replace URL with clean /login so refresh starts fresh
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }
  } catch (e) {}

  // Mobile services collapse
  servicesToggle.addEventListener('click', function(){
    var open = hero.classList.toggle('expanded');
    servicesToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
})();
</script>
</body>
</html>
